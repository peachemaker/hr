<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Система — Учёт кадров</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Отдел кадров</h1>

      <div class="toolbar">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Поиск по ФИО..."
          oninput="fetchEmployees()"
        />
        <select id="filterDept" onchange="fetchEmployees()"></select>
        <button class="btn-add" onclick="openModal()">+ Новый сотрудник</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>ФИО</th>
            <th>Отдел / Должность</th>
            <th>Контакты</th>
            <th>Статус</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="employeeTable"></tbody>
      </table>
    </div>

    <!-- Окно создания сотрудника -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <h3 id="modalTitle">Данные сотрудника</h3>
        <form id="empForm">
          <input type="hidden" id="empId" />
          <input type="text" id="fio" placeholder="ФИО" required />
          <input type="date" id="birthday" required title="Дата рождения" />
          <input
            type="text"
            id="passport"
            placeholder="Паспорт (0000 000000)"
            maxlength="11"
            oninput="maskPassport(this)"
            required
          />
          <input
            type="text"
            id="contact"
            placeholder="Телефон (+7...)"
            maxlength="18"
            oninput="maskPhone(this)"
            required
          />
          <input type="text" id="address" placeholder="Адрес" />
          <div class="form-row">
            <select id="department" required>
              <option value="">Выберите отдел</option>
            </select>
            <select id="position" required>
              <option value="">Выберите должность</option>
            </select>
          </div>
          <input
            type="number"
            id="salary"
            placeholder="Зарплата (руб)"
            step="1000"
            min="0"
          />
          <div class="modal-actions">
            <button type="button" onclick="closeModal()">Отмена</button>
            <button type="submit" class="btn-add">Сохранить</button>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
