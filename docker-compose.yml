version: '3.8'
services:
  postgres: 
    image: postgres:15
    container_name: hr_postgres
    environment:
      POSTGRES_DB: hr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Gav!nBels0n
    ports:
      - "5432:5432"  
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hr_app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres  
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: Gav!nBels0n
      DB_NAME: hr
    depends_on:
      postgres:
        condition: service_healthy  
    volumes:
      - ./public:/app/public

volumes:
  postgres_data:
